############################
# lychee.toml
#
# Purpose:
#   Lychee configuration for reproducible link checks locally and in CI.
#
# Key principles in this setup:
#   1) Do NOT use regex look-ahead / look-behind (not supported by Lychee).
#   2) Exclude unwanted directories/files via `exclude_path` (regex).
#   3) Check only HTTP(S) links by scheme to avoid failing on local file artifacts.
#   4) Accept HTTP 403 (some sites block automated link checkers).
############################


############################
# Display / Logging
############################

# Log level: "error", "warn", "info", "debug", "trace"
# Use "info" by default, switch to "debug" when troubleshooting.
verbose = "info"

# Disable interactive progress output (cleaner CI logs).
no_progress = false # false=progress bar, true=file list

# Human-readable output for logs.
format = "detailed"


############################
# Request Behavior
############################

# Per-request timeout in seconds.
# Consider increasing if you see frequent timeouts on vendor sites.
timeout = 45

# Maximum number of redirects to follow.
max_redirects = 5

# Retries help with flaky endpoints and transient failures (DNS, CDN, etc.).
max_retries = 4
retry_wait_time = 2

# Check web links AND local file links (including anchors in local Markdown/HTML).
scheme = ["http", "https", "file"]

# Do not enforce HTTPS globally (some sites still legitimately use HTTP).
require_https = false


############################
# Accepted HTTP status codes
############################

# Treat these HTTP status codes as valid.
#
# Why accept 403?
#   Some sites intentionally block bots or require cookies / JS challenges.
#   The link can still be valid for humans, so many teams accept 403.
accept = [
  200, 203, 206,
  301, 302, 303, 307, 308,

  403 # Forbidden (intentionally accepted)
]


############################
# Link exclusions (URLs)
############################

# Exclude URLs from checking (regex-based).
# Use this only if you have known flaky domains or intentionally unreachable links.
exclude = [
  # Local development links in documentation
  "^https?://localhost(:[0-9]+)?",
  "^https://www\\.st\\.com/.*",
  "^https://st\\.com/.*",
  # GitHub search is valid for humans, but automated checks may hit rate limits
  # and return HTTP 429.
  "^https://github\\.com/search\\?q=gostlink$",

  # Repo-internal issue, discussion, and PR comment links are treated as
  # stable documentation references once committed. In CI they are occasionally
  # flaky on GitHub's side (for example HTTP 502) although they remain valid for
  # human readers, so we skip remote re-validation for this link class instead
  # of whack-a-mole excluding individual URLs over time.
  "^https://github\\.com/rokath/trice/issues/[0-9]+$",
  "^https://github\\.com/rokath/trice/discussions/[0-9]+$",
  "^https://github\\.com/rokath/trice/pull/[0-9]+#issuecomment-[0-9]+$",
  # The README intentionally points to the latest release PDF asset. That file
  # only exists after the next release is published, so PR-time link checks
  # cannot validate it remotely yet.
  "^https://github\\.com/rokath/trice/releases/latest/download/TriceUserManual\\.pdf$",

  # This site intermittently answers automated checks with HTTP 202
  # although the article is reachable for normal users in a browser.
  "^https://circuitcellar\\.com/.*",

  # These sites are valid for human readers but flaky or hostile to CI bots.
  "^https://cte\\.e10labs\\.com/.*",
  "^https://winlibs\\.com/.*",
  "^https://www2\\.keil\\.com/mdk5/uvision/.*",
  "^https://developer\\.arm\\.com/downloads/-/arm-gnu-toolchain-downloads.*",
  "^https://developer\\.arm\\.com/documentation/ka004054/latest.*",
  "^https://developer\\.arm\\.com/Tools%20and%20Software/GNU%20Toolchain.*",
  "^https://www\\.babynamespedia\\.com/meaning/Trice.*",

  # These sites intermittently return HTTP 503 to automated checks although the
  # referenced content is intentionally kept as documentation links.
  "^https://2cld\\.de/.*",
  "^https://libopencm3\\.org/.*",
  "^https://libusb\\.info/.*",

  # htmlpreview.github.io is convenient for rendering checked-in HTML exports,
  # but it intermittently answers CI checks with HTTP 503.
  "^https://htmlpreview\\.github\\.io/.*",

  # The Homebrew landing page is a useful human-facing reference but has shown
  # intermittent HTTP 503 responses during CI link checks.
  "^https://brew\\.sh/.*"
]


############################
# Path exclusions (files/directories)
############################

# Exclude paths from being scanned (regex-based).
#
# Regex notes:
#   - "(^|[\\/])" matches either the start of the path or a directory separator
#   - "([\\/]|$)" ensures we match a directory boundary (or end of path)
exclude_path = [
  # Unreviewed working copy of the user manual. It duplicates the checked
  # links from the reviewed manual and adds noise to CI without protecting
  # shipped documentation.
  "(^|[\\\\/])docs[\\\\/]TriceUserManual_AI_reworked_NOT_reviewed\\.md$",

  # Legacy documentation directory (your current pain point)
  "(^|[\\\\/])docs[\\\\/]_Legacy([\\\\/]|$)",

  # Exclude "Drivers" directories anywhere under examples/
  "(^|[\\\\/])examples[\\\\/].*[\\\\/]Drivers([\\\\/]|$)",

  # Vendored / third-party content
  "(^|[\\\\/])third_party([\\\\/]|$)",

  # Generated artifacts
  "(^|[\\\\/])dist([\\\\/]|$)",

  # Git metadata (usually unnecessary, but harmless to exclude explicitly)
  "(^|[\\\\/])\\.git([\\\\/]|$)"
]
