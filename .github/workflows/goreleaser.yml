name: goreleaser

on:
  # This workflow is only triggered manually from the GitHub UI.
  # Go to: Actions -> "goreleaser" workflow -> "Run workflow".
  # This matches your intent: no automatic releases on push or tag.
  workflow_dispatch:
  # If in the future you want to trigger releases when pushing tags,
  # you can uncomment the block below:
  #
  # push:
  #   tags:
  #     - 'v*'          # e.g. v0.1.0, v1.2.3

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Run GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Fetch the full git history.
          # GoReleaser uses tags and commits to determine the version
          # and to generate changelogs. With a shallow clone this may fail
          # or produce incomplete changelogs.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Use the Go version declared in go.mod.
          # This keeps local development and CI in sync automatically.
          go-version-file: go.mod
          # Alternatively you could hard-code a version:
          # go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          # Use the standard GoReleaser distribution.
          distribution: goreleaser
          # Install the latest GoReleaser release.
          # For fully reproducible builds you can pin a specific version here.
          version: "~> v2"
          # "release --clean" is the modern equivalent of "--rm-dist":
          # it removes the dist/ directory before building, so you never
          # accidentally ship stale artifacts from a previous run.
          args: release --clean
        env:
          # GitHub automatically provides this token.
          # GoReleaser uses it to create or update the GitHub Release and
          # upload the build artifacts (archives, checksums, etc.).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repository Homebrew tap publishing needs a dedicated token
          # with contents:write on rokath/homebrew-tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Node.js is installed above because the GoReleaser "before" hook
          # generates docs/TriceUserManual.pdf headlessly before publishing.
          # You previously had DEFAULT_BRANCH here; GoReleaser does not
          # need it by default, so it is omitted for clarity.


      - name: Verify generated release artifacts
        shell: bash
        run: |
          set -euo pipefail

          dump_context() {
            echo "::group::Generated release artifact context"
            echo "dist/:"
            find dist -maxdepth 3 -type f -printf '%s %p\n' 2>/dev/null | sort || true
            echo "docs/ manual files:"
            find docs -maxdepth 2 \( -name 'TriceUserManual.md' -o -name 'TriceUserManual.pdf' \) -type f -printf '%s %p\n' 2>/dev/null | sort || true
            echo "tool versions:"
            go version || true
            node --version || true
            npm --version || true
            npx --version || true
            echo "::endgroup::"
          }

          require_file() {
            local file="$1"
            if [ ! -s "$file" ]; then
              echo "::error::missing or empty required artifact: $file"
              dump_context
              exit 1
            fi
            printf 'OK file: %s (%s bytes)\n' "$file" "$(wc -c < "$file")"
          }

          require_glob() {
            local pattern="$1"
            local matches=()
            mapfile -t matches < <(compgen -G "$pattern" | sort || true)

            if [ "${#matches[@]}" -eq 0 ]; then
              echo "::error::no artifact matches required pattern: $pattern"
              dump_context
              exit 1
            fi

            printf 'OK glob: %s\n' "$pattern"
            printf '  %s\n' "${matches[@]}"
          }

          require_file docs/TriceUserManual.pdf
          require_file dist/trice_tool_linux_amd64.tar.gz
          require_file dist/trice_tool_darwin_amd64.tar.gz
          require_file dist/trice_tool_windows_amd64.zip
          require_glob 'dist/trice_target_sources_*.zip'
          require_glob 'dist/trice_*_amd64.deb'
          require_glob 'dist/trice_*_amd64.rpm'
          require_glob 'dist/trice_*_amd64.apk'
