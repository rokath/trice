
# This workflow runs on pull requests (and manually),
# fails the check if any shell script isn’t formatted according to shfmt style.
# 
# Developers can fix formatting locally by running:
# 
# ./scripts/_format_shell_scripts.sh format

name: "shfmt (Shell Formatting)"

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  shfmt:
    name: Check shell script formatting (shfmt)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt

      - name: Run shfmt in check mode
        run: |
          chmod +x ./scripts/_format_shell_scripts.sh
          ./scripts/_format_shell_scripts.sh check
