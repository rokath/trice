<title>TriceAbc host demo bus topology</title><desc>Nine host-native demo nodes connected by a protocol-neutral file-backed broadcast byte bus, with shared NodeLib runtime and ABC/log dispatch.</desc><rect x="0" y="0" width="1420" height="940" rx="0" fill="#f8fafc" stroke="none" stroke-width="0" /><text x="60" y="62" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#0f172a" text-anchor="start"><tspan x="60" dy="0">examples/TriceAbc: host-native broadcast demo</tspan></text><text x="60" y="94" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#475569" text-anchor="start"><tspan x="60" dy="0">Nine processes share one byte bus. Trice/COBS parsing, ID resolution and ABC handler dispatch live above the protocol-neutral BcSim layer.</tspan></text><rect x="235" y="390" width="950" height="106" rx="24" fill="url(#bus-grad)" stroke="#1e293b" stroke-width="1.5" filter="url(#shadow)"/><text x="710.0" y="432" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" fill="white" text-anchor="middle"><tspan x="710.0" dy="0">abc.bus</tspan></text><text x="710.0" y="462" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#e0f2fe" text-anchor="middle"><tspan x="710.0" dy="0">append-only COBS-framed Trice byte stream — bytes only</tspan></text><text x="710.0" y="486" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#e0e7ff" text-anchor="middle"><tspan x="710.0" dy="0">BcSim suppresses self echo; late joiners do not replay old traffic</tspan></text><rect x="1050" y="520" width="135" height="48" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2" /><text x="1117.5" y="548" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#334155" text-anchor="middle"><tspan x="1117.5" dy="0">abc.log</tspan><tspan x="1117.5" dy="1.15em">diagnostic only</tspan></text><path d="M1117 505 V520" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)" stroke-dasharray="5 5"/><rect x="157.0" y="187.0" width="156" height="86" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
