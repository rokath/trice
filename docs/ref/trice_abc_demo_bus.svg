rray="7 5"/><path d="M360 496 C360 548 330 585 310 615" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)"/><path d="M535 496 C535 560 525 610 520 646" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)"/><path d="M745 496 C745 560 745 610 745 646" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)"/><rect x="1010" y="620" width="340" height="240" rx="20" fill="#ffffff" stroke="#334155" stroke-width="1.6" filter="url(#shadow)"/><text x="1032" y="656" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#0f172a" text-anchor="start"><tspan x="1032" dy="0">Shared NodeLib receive path</tspan></text><text x="1032" y="692" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="1032" dy="0">TriceWriteDeviceCgo() -&gt; bcSimWrite()</tspan><tspan x="1032" dy="1.36em">bcSimRead() -&gt; COBS frame collector</tspan><tspan x="1032" dy="1.36em">TriceParseRecord()</tspan><tspan x="1032" dy="1.36em">TriceResolveAbc() / TriceResolveLog()</tspan><tspan x="1032" dy="1.36em">handler or small demo log printer</tspan></text><rect x="1032" y="812" width="190" height="30" rx="15" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.2" /><text x="1127.0" y="832" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#075985" text-anchor="middle"><tspan x="1127.0" dy="0">parse once, then classify</tspan></text><path d="M990 495 C1030 555 1050 590 1090 620" fill="none" stroke="#334155" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)" stroke-dasharray="6 6"/><rect x="60" y="790" width="850" height="98" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" /><text x="82" y="822" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="start"><tspan x="82" dy="0">Command vocabulary shown by the demo</tspan></text><text x="82" y="850" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="82" dy="0">requests: cmd:setLeds · cmd:getLeds · cmd:setKey · cmd:logState · cmd:divide</tspan></text><text x="82" y="874" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="82" dy="0">responses: abc:LedsState · abc:DivideResult; stamped requests use low bits 0x1=N7, 0x2=N8, 0x4=N9</tspan></text><rect x="60" y="585" width="170" height="105" rx="18" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4" /><text x="145" y="617" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#92400e" text-anchor="middle"><tspan x="145" dy="0">generated</tspan><tspan x="145" dy="1.15em">NodeLib</tspan></text><text x="145" y="655" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#78350f" text-anchor="middle"><tspan x="145" dy="0">nodeAbc.c</tspan><tspan x="145" dy="1.25em">til.c</tspan></text><path d="M230 638 C300 590 415 535 490 496" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)" stroke-dasharray="6 5"/><text x="60" y="918" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Source basis: examples/TriceAbc ReadMe, NodeLib/node.c, BcSim.h, and docs/TriceUserManual.md chapter 35, wip branch.</tspan></text></svg>
