<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="860" viewBox="0 0 1420 860" role="img">
  <defs>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#23313f" />
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d" />
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7e22ce" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="bus-grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
<title>Trice ABC core workflow</title><desc>Build-time and runtime flow from ABC send macro through generated ID-function pointer table to receiver-side handler dispatch.</desc><rect x="0" y="0" width="1420" height="860" rx="0" fill="#f8fafc" stroke="none" stroke-width="0" /><text x="60" y="62" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#0f172a" text-anchor="start"><tspan x="60" dy="0">Trice ABC core: command name becomes receiver-side handler dispatch</tspan></text><text x="60" y="94" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#475569" text-anchor="start"><tspan x="60" dy="0">ABC is a small asynchronous broadcast-command primitive; addressing, replies, retries and RPC semantics live above it.</tspan></text><rect x="60" y="128" width="122" height="30" rx="15" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2" /><text x="121.0" y="148" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a" text-anchor="middle"><tspan x="121.0" dy="0">build time</tspan></text><rect x="60" y="450" width="100" height="30" rx="15" fill="#dcfce7" stroke="#4ade80" stroke-width="1.2" /><text x="110.0" y="470" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#14532d" text-anchor="middle"><tspan x="110.0" dy="0">runtime</tspan></text><path d="M60 168 H1360" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 8"/><path d="M60 490 H1360" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 8"/><rect x="70" y="190" width="285" height="165" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="70" y="190" width="285" height="9" rx="4.5" fill="#2563eb" opacity="0.95"/>
<text x="88" y="226" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="88" dy="0">1  Sender source</tspan></text>
<text x="88" y="258" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400" fill="#334155" text-anchor="start"><tspan x="88" dy="0">trice8C(&quot;cmd:setLeds&quot;,</tspan><tspan x="88" dy="1.28em">        &amp;mask, 1);</tspan><tspan x="88" dy="1.28em"></tspan><tspan x="88" dy="1.28em">TRice32C(&quot;cmd:divide&quot;,</tspan><tspan x="88" dy="1.28em">         stamp, args, 2);</tspan></text><rect x="425" y="190" width="245" height="165" rx="18" fill="#ffffff" stroke="#0891b2" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="425" y="190" width="245" height="9" rx="4.5" fill="#0891b2" opacity="0.95"/>
<text x="443" y="226" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="443" dy="0">2  trice insert</tspan></text>
<text x="443" y="258" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="443" dy="0">assigns compact IDs</tspan><tspan x="443" dy="1.28em">and updates til.json</tspan><tspan x="443" dy="1.28em"></tspan><tspan x="443" dy="1.28em">ID &lt;-&gt; &quot;cmd:setLeds&quot;</tspan><tspan x="443" dy="1.28em">ID &lt;-&gt; &quot;cmd:divide&quot;</tspan></text><rect x="735" y="175" width="280" height="195" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="735" y="175" width="280" height="9" rx="4.5" fill="#7c3aed" opacity="0.95"/>
<text x="753" y="211" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="753" dy="0">3  Receiver selection</tspan></text>
<text x="753" y="243" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="753" dy="0">trice generate -abc device_abc</tspan><tspan x="753" dy="1.28em"></tspan><tspan x="753" dy="1.28em">device_abc.h is user-owned:</tspan><tspan x="753" dy="1.28em">  void setLeds(const triceRx_t* rx);</tspan><tspan x="753" dy="1.28em"></tspan><tspan x="753" dy="1.28em">Command suffix after last colon</tspan><tspan x="753" dy="1.28em">becomes the C handler name.</tspan></text><rect x="1080" y="190" width="270" height="165" rx="18" fill="#ffffff" stroke="#9333ea" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="1080" y="190" width="270" height="9" rx="4.5" fill="#9333ea" opacity="0.95"/>
<text x="1098" y="226" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="1098" dy="0">4  Generated table</tspan></text>
<text x="1098" y="258" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400" fill="#334155" text-anchor="start"><tspan x="1098" dy="0">device_abc.c is regenerated</tspan><tspan x="1098" dy="1.28em">from til.json + selection:</tspan><tspan x="1098" dy="1.28em"></tspan><tspan x="1098" dy="1.28em">{ ID, 8,  setLeds }</tspan><tspan x="1098" dy="1.28em">{ ID, 32, divide  }</tspan></text><line x1="360" y1="273" x2="415" y2="273" stroke="#2563eb" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow-blue)"/><line x1="680" y1="273" x2="725" y2="273" stroke="#2563eb" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow-blue)"/><line x1="1025" y1="273" x2="1070" y2="273" stroke="#2563eb" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow-blue)"/><rect x="70" y="525" width="275" height="165" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="70" y="525" width="275" height="9" rx="4.5" fill="#16a34a" opacity="0.95"/>
<text x="88" y="561" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="88" dy="0">A  Transport payload</tspan></text>
<text x="88" y="593" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="88" dy="0">Only these bytes travel:</tspan><tspan x="88" dy="1.28em"></tspan><tspan x="88" dy="1.28em">Trice ID</tspan><tspan x="88" dy="1.28em">optional ABC stamp</tspan><tspan x="88" dy="1.28em">optional payload values</tspan><tspan x="88" dy="1.28em"></tspan><tspan x="88" dy="1.28em">No command string on the wire.</tspan></text><rect x="410" y="510" width="325" height="195" rx="18" fill="#ffffff" stroke="#15803d" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="410" y="510" width="325" height="9" rx="4.5" fill="#15803d" opacity="0.95"/>
<text x="428" y="546" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="428" dy="0">B  Receive core</tspan></text>
<text x="428" y="578" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400" fill="#334155" text-anchor="start"><tspan x="428" dy="0">TriceParseNextRecord(&amp;rx, ...)</tspan><tspan x="428" dy="1.28em">  then</tspan><tspan x="428" dy="1.28em">triceResolveAbc(&amp;rx, triceAbc, n)</tspan><tspan x="428" dy="1.28em">  then</tspan><tspan x="428" dy="1.28em">triceDispatchAbc(&amp;rx)</tspan><tspan x="428" dy="1.28em"></tspan><tspan x="428" dy="1.28em">Unknown IDs are normal in mixed streams.</tspan></text><rect x="800" y="510" width="295" height="195" rx="18" fill="#ffffff" stroke="#ea580c" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="800" y="510" width="295" height="9" rx="4.5" fill="#ea580c" opacity="0.95"/>
<text x="818" y="546" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="818" dy="0">C  Local handler</tspan></text>
<text x="818" y="578" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="818" dy="0">void setLeds(const triceRx_t* rx)</tspan><tspan x="818" dy="1.28em"></tspan><tspan x="818" dy="1.28em">• validate bitWidth/payloadBytes</tspan><tspan x="818" dy="1.28em">• copy multi-byte values if needed</tspan><tspan x="818" dy="1.28em">• touch local application state</tspan><tspan x="818" dy="1.28em">• optionally emit responses</tspan></text><rect x="1160" y="510" width="200" height="195" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="1.6" filter="url(#shadow)"/>
<rect x="1160" y="510" width="200" height="9" rx="4.5" fill="#f97316" opacity="0.95"/>
<text x="1178" y="546" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start"><tspan x="1178" dy="0">Application policy</tspan></text>
<text x="1178" y="578" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start"><tspan x="1178" dy="0">Not built into ABC:</tspan><tspan x="1178" dy="1.28em"></tspan><tspan x="1178" dy="1.28em">addressing</tspan><tspan x="1178" dy="1.28em">acks / retries</tspan><tspan x="1178" dy="1.28em">timeouts</tspan><tspan x="1178" dy="1.28em">authorization</tspan><tspan x="1178" dy="1.28em">return values / RPC</tspan></text><path d="M1202 357 C1202 425 205 420 205 515" fill="none" stroke="#64748b" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)" stroke-dasharray="7 7"/><text x="575" y="425" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="575" dy="0">table is compiled into each receiver that selected the handlers</tspan></text><line x1="355" y1="607" x2="400" y2="607" stroke="#15803d" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow-green)"/><line x1="745" y1="607" x2="790" y2="607" stroke="#15803d" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow-green)"/><line x1="1105" y1="607" x2="1150" y2="607" stroke="#ea580c" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow-dark)"/><rect x="70" y="742" width="1290" height="68" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2" /><text x="96" y="772" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1e1b4b" text-anchor="start"><tspan x="96" dy="0">Read this first: ABC reuses normal Trice records. The command text lives in TIL/generator data;</tspan></text><text x="96" y="797" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#3730a3" text-anchor="start"><tspan x="96" dy="0">the receiver executes only handlers compiled into its generated ABC table. Routing, reliability and trust stay explicit in application code.</tspan></text><text x="60" y="838" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Source basis: docs/TriceUserManual.md chapter 35, wip branch, and examples/TriceAbc.</tspan></text></svg>
