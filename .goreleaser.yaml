version: 2

# This is an example .goreleaser.yaml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
    # Generate the release manual PDF into temp/ without modifying docs/*.pdf.
    # The GitHub release uploads that generated file directly as a standalone
    # asset. Local helper scripts may copy it into dist/ after GoReleaser
    # finishes so developers can inspect the full asset set locally.
    - ./scripts/_generate_trice_user_manual_release_pdf.sh
# https://goreleaser.com/customization/#Builds

builds:
  #
  # 1) Universal 64-bit build for ALL platforms:
  #    - windows/amd64
  #    - windows/arm64
  #    - linux/amd64
  #    - linux/arm64
  #    - darwin/amd64
  #    - darwin/arm64
  #
  - id: trice-64bit   # ID of the build. Defaults to the project name.
    main: ./cmd/trice # Path to main.go file or main package. Default is `.`.
    binary: trice     # Binary name. Can be a path (e.g. `bin/app`) to wrap the binary in a directory. Default is the name of the project directory.
    dir: .            # Path to project's (sub)directory containing Go code. This is the working directory for the Go build command(s). Default is `.`.
    goos:             # GOOS list to build for. For more info refer to: https://golang.org/doc/install/source#environment.
      - windows
      - linux
      - darwin
    goarch:           # GOARCH to build for. For more info refer to: https://golang.org/doc/install/source#environment. Defaults are 386 and amd64.
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:          # You don't need to set this because GoReleaser sets the three ldflags by default anyway.
      - >-            # But sometimes it's better to be explicit, especially if you want to expand later (e.g., builtBy):
        -s -w
        -X main.version={{ .Version }}
        -X main.commit={{ .Commit }}
        -X main.date={{ .Date }}
        -X main.builtBy=goreleaser
  
  #
  # 2) 32-bit build ONLY for Windows and Linux (NO darwin/386)
  #
  - id: trice-32bit   # ID of the build. Defaults to the project name.
    main: ./cmd/trice # Path to main.go file or main package. Default is `.`.
    binary: trice     # Binary name. Can be a path (e.g. `bin/app`) to wrap the binary in a directory. Default is the name of the project directory.
    dir: .            # Path to project's (sub)directory containing Go code. This is the working directory for the Go build command(s). Default is `.`.
    goos:             # GOOS list to build for. For more info refer to: https://golang.org/doc/install/source#environment.
      - windows
      - linux         # <— darwin deliberately omitted
    goarch:           # GOARCH to build for. For more info refer to: https://golang.org/doc/install/source#environment. Defaults are 386 and amd64.
      - 386           # <— 32-bit x86 only here
    env:
      - CGO_ENABLED=0
    ldflags:          # You don't need to set this because GoReleaser sets the three ldflags by default anyway.
      - >-            # But sometimes it's better to be explicit, especially if you want to expand later (e.g., builtBy):
        -s -w
        -X main.version={{ .Version }}
        -X main.commit={{ .Commit }}
        -X main.date={{ .Date }}
        -X main.builtBy=goreleaser

  #
  # 3) ARMv6/v7 Linux builds (embedded targets)
  #
  - id: trice-arm32   # ID of the build. Defaults to the project name.
    main: ./cmd/trice # Path to main.go file or main package. Default is `.`.
    binary: trice     # Binary name. Can be a path (e.g. `bin/app`) to wrap the binary in a directory. Default is the name of the project directory.
    dir: .            # Path to project's (sub)directory containing Go code. This is the working directory for the Go build command(s). Default is `.`.
    goos:             # GOOS list to build for. For more info refer to: https://golang.org/doc/install/source#environment.
      - linux
    goarch:           # GOARCH to build for. For more info refer to: https://golang.org/doc/install/source#environment. Defaults are 386 and amd64.
      - arm
    goarm:            # GOARM to build for when GOARCH is arm. (only Linux). For more info refer to: https://golang.org/doc/install/source#environment. # Default is only 6.
      - 6
      - 7
    env:              # Custom environment variables to be set during the builds. # Default is empty.
      - CGO_ENABLED=0
    ldflags:          # You don't need to set this because GoReleaser sets the three ldflags by default anyway.
      - >-            # But sometimes it's better to be explicit, especially if you want to expand later (e.g., builtBy):
        -s -w
        -X main.version={{ .Version }}
        -X main.commit={{ .Commit }}
        -X main.date={{ .Date }}
        -X main.builtBy=goreleaser

checksum:
  # You can change the name of the checksums file.
  # Default is `{{ .ProjectName }}_{{ .Version }}_checksums.txt`.
  #name_template: "{{ .ProjectName }}_checksums.txt"
  #name_template: 'checksums.txt'
  # Algorithm to be used.
  # Accepted options are sha256, sha512, sha1, crc32, md5, sha224 and sha384.
  # Default is sha256.
  #algorithm: sha256

snapshot:
  # Allows you to change the name of the generated snapshot
  #
  # Note that some pipes require this to be semantic version compliant (nfpm,
  # for example).
  #
  # Default is `{{ .Tag }}-SNAPSHOT-{{.ShortCommit}}`.
  #name_template: 1.2.3-SNAPSHOT-{{.Commit}}
  #name_template: "{{ .Tag }}-next"
  #name_template: "{{ incpatch .Version }}-next"

# You can customize how the changelog is generated using the changelog section in the config file
changelog:
  # set it to true if you wish to skip the changelog generation
  #skip: false
  # could either be asc, desc or empty
  # Default is empty
  sort: asc
  filters:
    # commit messages matching the regexp listed here will be removed from
    # the changelog
    # Default is empty
    exclude:
      - '^typo$'
      - '^minor$'
      - '^update$'
      - '^wip$'

# The lines beneath this are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

archives:
  # Release assets are intentionally split by user intent:
  #   1. Small platform-specific host tool archives (`trice_tool_*`)
  #   2. One platform-independent target-source archive for embedded projects
  #
  # GitHub itself additionally provides the automatic "Source code (zip/tar.gz)"
  # snapshots for the full repository at each tag, so the custom assets below do
  # not need to duplicate the complete repo content.
  - id: trice-tool
    # Keep the platform archives intentionally small: only the built host tool
    # binary belongs here.
    #
    # GoReleaser adds README/LICENSE files automatically when "files:" is
    # omitted. This repository intentionally does not want those extras inside
    # the tool archives, so a guaranteed non-matching glob is used to disable
    # the defaults without having to carry extra files in every platform asset.
    name_template: "trice_tool_{{ .Os }}_{{ .Arch }}{{ .Arm }}"

    # Wrapping the archive content in one directory prevents accidental file
    # scattering when users unpack the asset into an existing folder.
    wrap_in_directory: true

    # tar.gz is the default for Unix-like systems. Windows gets zip below.
    formats:
      - tar.gz

    # Windows users typically expect zip archives.
    format_overrides:
      - goos: windows
        formats: ["zip"]

    # Intentionally matches nothing. See comment above.
    files:
      - "none*"

  - id: trice-target-sources
    # Release the embedded target integration sources as a dedicated asset.
    # This keeps the host-tool archives small while still shipping the files
    # that firmware projects actually need from ./src.
    #
    # "meta: true" means this archive is not tied to any Go build output. It is
    # a standalone release asset built only from the listed source files.
    meta: true
    name_template: "trice_target_sources_{{ .Version }}"
    wrap_in_directory: true

    # One zip is sufficient here because the content is plain source code and
    # therefore platform-independent.
    formats:
      - zip

    # Only the target-side integration sources are packaged here. Go code,
    # tests, CI files and examples remain outside this asset on purpose.
    files:
      - src: "src/*.c"
        dst: src
        strip_parent: true
      - src: "src/*.h"
        dst: src
        strip_parent: true
      - src: "src/*.md"
        dst: src
        strip_parent: true

release:
  # The generated PDF is uploaded as a standalone release asset so it stays
  # platform-independent and does not bloat every platform-specific tool archive.
  #
  # Unlike docs/TriceUserManual.pdf, this file is generated by the GoReleaser
  # pipeline itself in temp/. That keeps the repository free of generated
  # binaries while still giving the release workflow a standalone PDF asset.
  extra_files:
    - glob: "temp/release/TriceUserManual.pdf"
      name_template: "TriceUserManual_{{ .Version }}.pdf"
